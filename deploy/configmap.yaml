apiVersion: v1
kind: ConfigMap
metadata:
  name: mysqlmcp-config
  namespace: mysqlmcp
  labels:
    app: mysqlmcp
data:
  config.yaml: |
    server:
      token: ""
      port: 8000

    defaults:
      timeout_seconds: 60
      max_rows: 10000

    instances:
      - instance_id: "cdbro-2u0en2el"
        dsn: "user:password@tcp(host:3838)/?charset=utf8mb4&parseTime=true"
        environment: "testing"
        read_only: true
        timeout_seconds: 30
        max_rows: 1000
        remark: "tkex-middle-back专用ro"

      - instance_id: "camp"
        dsn: "user:password@tcp(host:3306)/?charset=utf8mb4&parseTime=true"
        environment: "testing"
        read_only: true
        timeout_seconds: 30
        max_rows: 1000
        remark: "camp test"
