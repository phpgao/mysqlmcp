apiVersion: v1
kind: ConfigMap
metadata:
  name: mysqlmcp-config
  namespace: mysqlmcp
  labels:
    app: mysqlmcp
data:
  config.yaml: |
    server:
      token: ""
      port: 8000

    defaults:
      timeout_seconds: 30
      max_rows: 10000

    instances:
      - instance_id: "prod-readonly"
        dsn: "user:password@tcp(mysql-host:3306)/mydb?charset=utf8mb4&parseTime=true"
        environment: "production"
        read_only: true
        timeout_seconds: 30
        max_rows: 1000

      - instance_id: "staging-rw"
        dsn: "user:password@tcp(mysql-host:3307)/mydb?charset=utf8mb4&parseTime=true"
        environment: "staging"
        read_only: false
        timeout_seconds: 60
        max_rows: 5000
