apiVersion: v1
kind: Service
metadata:
  name: mysqlmcp
  namespace: mysqlmcp
  labels:
    app: mysqlmcp
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: mcp-http
  selector:
    app: mysqlmcp
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysqlmcp
  namespace: mysqlmcp
  labels:
    app: mysqlmcp
spec:
  serviceName: mysqlmcp
  replicas: 1
  selector:
    matchLabels:
      app: mysqlmcp
  template:
    metadata:
      labels:
        app: mysqlmcp
    spec:
      containers:
        - name: mysqlmcp
          image: ghcr.io/phpgao/mysqlmcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
              name: mcp-http
          env:
            - name: MYSQLMCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mysqlmcp
                  key: MYSQLMCP_TOKEN
          volumeMounts:
            - name: config
              mountPath: /config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: mysqlmcp-config
